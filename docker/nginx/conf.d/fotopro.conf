upstream django_api {
    server api:8000;
    keepalive 32;
}

upstream nextjs_frontend {
    server frontend:3000;
    keepalive 16;
}

server {
    listen 80;
    server_name localhost fotopro.local;

    # ── Static & Media ────────────────────────────────────────────────────────
    location /static/ {
        alias /app/staticfiles/;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    location /media/ {
        alias /app/media/;
        expires 1h;
        add_header Cache-Control "private";
        # Prevent direct access to originals without auth
        # (handled at app level via signed URLs)
    }

    # ── API ───────────────────────────────────────────────────────────────────
    location /api/auth/ {
        limit_req zone=api_auth burst=5 nodelay;
        proxy_pass http://django_api;
        include /etc/nginx/conf.d/proxy_params.inc;
    }

    location /api/photos/upload/ {
        limit_req zone=api_upload burst=3 nodelay;
        proxy_pass http://django_api;
        proxy_read_timeout 120s;
        include /etc/nginx/conf.d/proxy_params.inc;
    }

    location /api/ {
        limit_req zone=api_general burst=20 nodelay;
        proxy_pass http://django_api;
        include /etc/nginx/conf.d/proxy_params.inc;
    }

    # ── Admin ─────────────────────────────────────────────────────────────────
    location /admin/ {
        proxy_pass http://django_api;
        include /etc/nginx/conf.d/proxy_params.inc;
        # Restrict to internal networks in production
        # allow 10.0.0.0/8;
        # deny all;
    }

    # ── Swagger / ReDoc ───────────────────────────────────────────────────────
    location ~ ^/(api/docs|api/redoc|api/schema)/ {
        proxy_pass http://django_api;
        include /etc/nginx/conf.d/proxy_params.inc;
    }

    # ── Metrics (Prometheus) ──────────────────────────────────────────────────
    location /metrics {
        proxy_pass http://django_api;
        include /etc/nginx/conf.d/proxy_params.inc;
        # Restrict to monitoring subnet in production
        # allow 10.0.0.0/8;
        # deny all;
    }

    # ── Frontend (Next.js) ────────────────────────────────────────────────────
    location / {
        proxy_pass http://nextjs_frontend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    # ── Health ────────────────────────────────────────────────────────────────
    location /nginx-health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }
}
