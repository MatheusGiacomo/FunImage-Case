version: "3.9"

# ─── Networks ─────────────────────────────────────────────────────────────────
networks:
  fotopro-net:
    driver: bridge

# ─── Volumes ──────────────────────────────────────────────────────────────────
volumes:
  postgres_data:
  mongo_data:
  redis_data:
  minio_data:
  media_data:
  static_data:

# ─── Shared environment ───────────────────────────────────────────────────────
x-django-env: &django-env
  DJANGO_ENV: development
  DJANGO_SETTINGS_MODULE: config.settings
  SECRET_KEY: dev-secret-key-change-in-production-please
  # PostgreSQL
  POSTGRES_DB: fotopro
  POSTGRES_USER: fotopro
  POSTGRES_PASSWORD: fotopro_dev_pass
  POSTGRES_HOST: postgres
  POSTGRES_PORT: "5432"
  # MongoDB
  MONGO_URI: mongodb://mongo:27017
  MONGO_DB_NAME: fotopro_meta
  # Redis
  REDIS_URL: redis://redis:6379/0
  # MinIO (S3-compatible local storage)
  USE_S3: "True"
  AWS_ACCESS_KEY_ID: minioadmin
  AWS_SECRET_ACCESS_KEY: minioadmin
  AWS_STORAGE_BUCKET_NAME: fotopro-media
  AWS_S3_REGION_NAME: us-east-1
  AWS_S3_ENDPOINT_URL: http://minio:9000
  # Photo processing
  WATERMARK_TEXT: "© FotoPro"
  WATERMARK_OPACITY: "0.35"
  MAX_UPLOAD_SIZE_MB: "50"
  # Download tokens
  DOWNLOAD_TOKEN_SECRET: dev-download-secret-change-me
  DOWNLOAD_TOKEN_MAX_AGE: "3600"
  # CORS
  CORS_ALLOWED_ORIGINS: http://localhost:3000

x-django-healthcheck: &django-healthcheck
  healthcheck:
    test: ["CMD", "curl", "-f", "http://localhost:8000/api/health/"]
    interval: 30s
    timeout: 10s
    retries: 3
    start_period: 40s

# ─── Services ─────────────────────────────────────────────────────────────────
services:

  # ── PostgreSQL 16 ────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: fotopro-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: fotopro
      POSTGRES_USER: fotopro
      POSTGRES_PASSWORD: fotopro_dev_pass
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=pt_BR.UTF-8"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    networks:
      - fotopro-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fotopro -d fotopro"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ── MongoDB 7 ─────────────────────────────────────────────────────────────────
  mongo:
    image: mongo:7-jammy
    container_name: fotopro-mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_DATABASE: fotopro_meta
    volumes:
      - mongo_data:/data/db
      - ./mongo/init.js:/docker-entrypoint-initdb.d/init.js:ro
    ports:
      - "27017:27017"
    networks:
      - fotopro-net
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ── Redis 7 ───────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: fotopro-redis
    restart: unless-stopped
    command: >
      redis-server
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --save 900 1
      --save 300 10
      --appendonly yes
      --appendfsync everysec
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - fotopro-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── MinIO (S3-compatible) ─────────────────────────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: fotopro-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Console UI
    networks:
      - fotopro-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  # ── MinIO bucket initializer (one-shot) ───────────────────────────────────────
  minio-init:
    image: minio/mc:latest
    container_name: fotopro-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin;
      mc mb --ignore-existing local/fotopro-media;
      mc anonymous set download local/fotopro-media/public;
      echo 'MinIO bucket ready';
      "
    networks:
      - fotopro-net
    restart: "no"

  # ── Django API ────────────────────────────────────────────────────────────────
  api:
    build:
      context: ../backend
      dockerfile: Dockerfile
      target: development
    container_name: fotopro-api
    restart: unless-stopped
    environment:
      <<: *django-env
    volumes:
      - ../backend:/app
      - media_data:/app/media
      - static_data:/app/staticfiles
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      mongo:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - fotopro-net
    command: >
      sh -c "
        python manage.py wait_for_db &&
        python manage.py migrate --noinput &&
        python manage.py create_periodic_tasks &&
        python manage.py runserver 0.0.0.0:8000
      "

  # ── Celery Worker ─────────────────────────────────────────────────────────────
  celery-worker:
    build:
      context: ../backend
      dockerfile: Dockerfile
      target: development
    container_name: fotopro-celery-worker
    restart: unless-stopped
    environment:
      <<: *django-env
    volumes:
      - ../backend:/app
      - media_data:/app/media
    depends_on:
      api:
        condition: service_started
      redis:
        condition: service_healthy
    networks:
      - fotopro-net
    command: >
      celery -A config.celery worker
        --loglevel=info
        --concurrency=2
        --queues=watermark,storage,maintenance,celery
        --max-tasks-per-child=100

  # ── Celery Beat ───────────────────────────────────────────────────────────────
  celery-beat:
    build:
      context: ../backend
      dockerfile: Dockerfile
      target: development
    container_name: fotopro-celery-beat
    restart: unless-stopped
    environment:
      <<: *django-env
    volumes:
      - ../backend:/app
    depends_on:
      api:
        condition: service_started
      redis:
        condition: service_healthy
    networks:
      - fotopro-net
    command: >
      celery -A config.celery beat
        --loglevel=info
        --scheduler django_celery_beat.schedulers:DatabaseScheduler

  # ── Flower (Celery monitoring) ────────────────────────────────────────────────
  flower:
    build:
      context: ../backend
      dockerfile: Dockerfile
      target: development
    container_name: fotopro-flower
    restart: unless-stopped
    environment:
      <<: *django-env
      FLOWER_PORT: "5555"
      FLOWER_BASIC_AUTH: "admin:flowerpass"
    volumes:
      - ../backend:/app
    ports:
      - "5555:5555"
    depends_on:
      - redis
    networks:
      - fotopro-net
    command: >
      celery -A config.celery flower
        --port=5555
        --broker=redis://redis:6379/1
        --basic_auth=admin:flowerpass

  # ── Frontend (Next.js) ────────────────────────────────────────────────────────
  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000/api
      NODE_ENV: production
    ports:
      - "3000:3000"
    depends_on:
      - api
    networks:
      - fotopro-net

  # ── Nginx reverse proxy ───────────────────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: fotopro-nginx
    restart: unless-stopped
    # Remove the default.conf that ships with the nginx image — it conflicts
    # with our custom fotopro.conf and causes the ERR_EMPTY_RESPONSE.
    entrypoint: >
      /bin/sh -c "rm -f /etc/nginx/conf.d/default.conf && nginx -g 'daemon off;'"
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - static_data:/app/staticfiles:ro
      - media_data:/app/media:ro
    depends_on:
      - api
      - frontend
    networks:
      - fotopro-net
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 10s
      retries: 3
