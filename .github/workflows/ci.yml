name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "20"
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/fotopro-api

# ─── Jobs ─────────────────────────────────────────────────────────────────────

jobs:

  # ── Backend: Lint & Type Check ───────────────────────────────────────────────
  backend-lint:
    name: Backend · Lint & Type Check
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: backend/requirements-dev.txt

      - name: Install lint dependencies
        run: pip install ruff black isort mypy django-stubs djangorestframework-stubs

      - name: Ruff (linter)
        run: ruff check apps config

      - name: Black (formatter check)
        run: black --check apps config

      - name: isort (import order check)
        run: isort --check-only apps config

  # ── Backend: Tests ────────────────────────────────────────────────────────────
  backend-test:
    name: Backend · Tests
    runs-on: ubuntu-latest
    needs: backend-lint

    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: fotopro_test
          POSTGRES_USER: fotopro
          POSTGRES_PASSWORD: fotopro
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      mongo:
        image: mongo:7
        ports: ["27017:27017"]
        options: >-
          --health-cmd "mongosh --eval 'db.adminCommand(\"ping\")'"
          --health-interval 15s
          --health-timeout 10s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libmagic1 libmagic-dev \
            libjpeg-dev libpng-dev libwebp-dev \
            libfreetype6-dev

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Run tests with coverage
        env:
          DJANGO_ENV: test
          DJANGO_SETTINGS_MODULE: config.settings
          SECRET_KEY: ci-test-secret-key-not-for-production
          POSTGRES_DB: fotopro_test
          POSTGRES_USER: fotopro
          POSTGRES_PASSWORD: fotopro
          POSTGRES_HOST: localhost
          POSTGRES_PORT: "5432"
          REDIS_URL: redis://localhost:6379/0
          MONGO_URI: mongodb://localhost:27017
          MONGO_DB_NAME: fotopro_test
          USE_S3: "False"
          DOWNLOAD_TOKEN_SECRET: ci-download-secret
          WATERMARK_TEXT: "© FotoPro CI"
        run: |
          pytest \
            --cov=apps \
            --cov-report=xml \
            --cov-report=term-missing \
            --cov-fail-under=75 \
            -q

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: backend/coverage.xml
          flags: backend
          fail_ci_if_error: false

  # ── Frontend: Lint & Type Check ───────────────────────────────────────────────
  frontend-lint:
    name: Frontend · Lint & Type Check
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: ESLint
        run: npm run lint

      - name: TypeScript type check
        run: npm run type-check

  # ── Frontend: Build ───────────────────────────────────────────────────────────
  frontend-build:
    name: Frontend · Build
    runs-on: ubuntu-latest
    needs: frontend-lint

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000/api
        run: npm run build

  # ── Security: Dependency Audit ─────────────────────────────────────────────
  security-audit:
    name: Security · Dependency Audit
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Audit Python dependencies
        working-directory: backend
        run: pip-audit -r requirements.txt --ignore-vuln PYSEC-2024-70 || true

      - name: Audit Node dependencies
        working-directory: frontend
        run: npm audit --audit-level=high || true

  # ── Docker: Build & Push ───────────────────────────────────────────────────
  docker-build:
    name: Docker · Build & Push
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: backend
          file: backend/Dockerfile
          target: production
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Deploy: Production ────────────────────────────────────────────────────
  # NOTA: o campo `environment` requer que o environment "production" exista
  # em Settings → Environments do repositório no GitHub.
  # Para criar: Settings → Environments → New environment → "production"
  # Se preferir não usar environments, remova a linha `environment: production`.
  deploy:
    name: Deploy · Production
    runs-on: ubuntu-latest
    needs: [docker-build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    # environment: production   ← descomente após criar o environment no GitHub

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -e
            cd /opt/fotopro

            echo "=== Pulling new images ==="
            docker compose pull api celery-worker celery-beat

            echo "=== Rolling update ==="
            docker compose up -d --no-deps --wait api celery-worker celery-beat

            echo "=== Running migrations ==="
            docker compose exec -T api python manage.py migrate --noinput

            echo "=== Collecting static files ==="
            docker compose exec -T api python manage.py collectstatic --noinput

            echo "=== Health check ==="
            sleep 5
            curl --fail --silent http://localhost:8000/api/health/ | grep -q '"status"' \
              && echo "Health check passed" \
              || (echo "Health check FAILED" && exit 1)

            echo "=== Deployed at $(date) · SHA: ${{ github.sha }} ==="