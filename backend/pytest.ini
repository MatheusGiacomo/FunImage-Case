[pytest]
DJANGO_SETTINGS_MODULE = config.settings
DJANGO_ENV = test
python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*
addopts =
    --strict-markers
    -q
    --tb=short
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    integration: marks tests that need external services
asyncio_mode = auto